name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests-integration/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests-integration/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration.yml"
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run"
        required: false
        default: "all"
        type: choice
        options: [all, engine, mcp, acp]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - uses: astral-sh/setup-uv@v5
        with:
          working-directory: tests-integration

      - name: Install Python deps
        run: uv sync --group dev
        working-directory: tests-integration

      - name: Run engine suite
        if: ${{ inputs.suite == 'all' || inputs.suite == 'engine' || inputs.suite == '' }}
        run: make -C tests-integration test-engine BINARY=$(pwd)/target/debug/llm-wiki

      - name: Run MCP suite
        if: ${{ inputs.suite == 'all' || inputs.suite == 'mcp' || inputs.suite == '' }}
        run: make -C tests-integration test-mcp BINARY=$(pwd)/target/debug/llm-wiki

      - name: Run ACP suite
        if: ${{ inputs.suite == 'all' || inputs.suite == 'acp' || inputs.suite == '' }}
        run: make -C tests-integration test-acp BINARY=$(pwd)/target/debug/llm-wiki
